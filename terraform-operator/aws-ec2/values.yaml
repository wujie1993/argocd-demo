# 原配置不变，仅追加以下内容
approval:
  # 🔥 生产环境必须开启：plan后自动阻塞，等待人工审批
  enabled: false  

# Set this to an existing ServiceAccount if you want Terraform Operator runner pods
# to use a stable identity instead of the generated tf-<name>-v<generation> account.
serviceAccount: "aws-ec2"

# 原有配置
aws:
  region: us-east-1
  credsSecret: aws-creds
ec2:
  name: aws-ec2
  instanceType: t3.micro
terraform:
  version: "1.4.6"