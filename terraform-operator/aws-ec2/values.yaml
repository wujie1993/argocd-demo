# ServiceAccount used by Terraform Operator runner pods.
serviceAccount: "aws-ec2"

# When enabled, plan output must be manually approved before apply runs.
approval:
  enabled: false

aws:
  region: us-east-1
  # "vault" - read credentials from Vault KV v2 (requires Vault setup)
  # "env"   - inject credentials from a Kubernetes secret as env vars
  credentialsSource: vault
  # Used when credentialsSource is "env".
  # Secret must have keys: access-key, secret-key
  credsSecret: aws-creds
  # Used when credentialsSource is "vault".
  # Matches: vault kv get <vaultKvMount>/<vaultSecretName>
  vaultKvMount: secret
  vaultSecretName: aws

ec2:
  name: aws-ec2
  instanceType: t3.micro

terraform:
  version: "1.4.6"