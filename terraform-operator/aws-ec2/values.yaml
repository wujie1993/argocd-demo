# ServiceAccount used by Terraform Operator runner pods.
serviceAccount: "aws-ec2"

# When enabled, plan output must be manually approved before apply runs.
approval:
  enabled: false

aws:
  region: us-east-1
  # "env"           - inject credentials from a Kubernetes secret as env vars
  # "vault-static"  - read static AK/SK from Vault KV v2
  # "vault-dynamic" - read dynamic creds from Vault AWS Secrets Engine
  credentialsSource: vault-dynamic
  # Used when credentialsSource is "env".
  # Secret must have keys: access-key, secret-key
  credsSecret: aws-creds
  # Used when credentialsSource is "vault-static".
  # Matches: vault kv get <vaultKvMount>/<vaultKvSecretName>
  vaultKvMount: secret
  vaultKvSecretName: aws
  vaultStaticAccessKeyField: ak
  vaultStaticSecretKeyField: sk
  # Used when credentialsSource is "vault-dynamic".
  # Matches: vault read <vaultAwsBackend>/creds/<vaultAwsRole>
  vaultAwsBackend: aws
  vaultAwsRole: aws-ec2
  # creds (iam_user, requires the extra IAM/KMS actions documented in README) or sts (assumed_role)
  vaultAwsType: sts
  # Vault Kubernetes auth role used by Terraform runner login.
  vaultKubernetesAuthRole: aws-ec2

ec2:
  name: aws-ec2
  instanceType: t3.micro

# Backend for Terraform state storage.
# "kubernetes" - store state in a Kubernetes secret (in-cluster, no extra setup)
# "s3"         - store state in an S3 bucket (recommended; encrypted at rest)
backend:
  type: s3
  s3:
    # Required: name of the S3 bucket that holds Terraform state files.
    bucket: ""
    # Required: object key path inside the bucket.
    key: "aws-ec2/terraform.tfstate"
    # Region where the bucket lives. Defaults to aws.region when empty.
    region: ""
    # Enable S3 server-side encryption. Should always be true.
    encrypt: true
    # Optional: ARN of a KMS key for SSE-KMS encryption.
    # Leave empty to use SSE-S3 (AES-256).
    kmsKeyId: ""
    # Enable S3 native state locking (requires Terraform >= 1.10).
    # Stores a .tflock file next to the state; no DynamoDB needed.
    useLockfile: true

terraform:
  version: "1.10.0"