apiVersion: tf.galleybytes.com/v1beta1
kind: Terraform
metadata:
  name: {{ .Values.ec2.name }}
spec:
  terraformVersion: {{ .Values.terraform.version }}
  persistentVolumeSize: 500Mi
  keepLatestPodsOnly: true
  setup:
    cleanupDisk: true
  ignoreDelete: false

  # 🔥 【核心改动】从values读取配置，开启人工审批卡点
  {{- if .Values.approval.enabled }}
  approvePlan: true  # 自动plan后阻塞，必须人工批准
  {{- end }}

  # 以下全部保持 官方示例 不变
  backend: |-
    terraform {
      backend "kubernetes" {
        secret_suffix    = "{{ .Values.ec2.name }}"
        namespace        = "{{ .Release.Namespace }}"
        in_cluster_config = true
      }
    }
  outputsSecret: "{{ .Values.ec2.name }}-outputs"
  terraformModule:
    inline: |-
      {{ (.Files.Get "main.tf") | nindent 6 }}
  
  # taskOptions 保持不变
  taskOptions:
  - for: ["plan", "apply", "plan-delete", "apply-delete"]
    env:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: {{ .Values.aws.credsSecret }}
          key: access-key
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: {{ .Values.aws.credsSecret }}
          key: secret-key
    - name: AWS_REGION
      value: {{ .Values.aws.region }}
    - name: TF_VAR_aws_region
      value: {{ .Values.aws.region }}

  - for: ["plan", "apply"]
    env:
    - name: TF_VAR_ec2_name
      value: {{ .Values.ec2.name | quote }}