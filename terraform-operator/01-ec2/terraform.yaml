apiVersion: tf.galleybytes.com/v1beta1
kind: Terraform
metadata:
  name: learn-terraform-ec2
spec:
  # ✅ v0.17.1 正确字段：module 对象，引用ConfigMap
  terraformModule:
    configMapRef:
      name: tf-ec2-code

  # ✅ v0.17.1 正确格式：backend 字符串(HCL)
  backend: |
    backend "local" {}

  # Terraform 版本
  terraformVersion: "1.8.0"

  # AWS 认证凭证（从K8s Secret读取）
  env:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: aws-creds
          key: access-key
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: aws-creds
          key: secret-key