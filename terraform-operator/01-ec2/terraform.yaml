apiVersion: tf.galleybytes.com/v1beta1
kind: Terraform
metadata:
  name: learn-terraform-ec2
spec:
  # 你的 Terraform 代码（正确字段：terraformModule）
  terraformModule: |
    terraform {
      required_providers {
        aws = {
          source  = "hashicorp/aws"
          version = "~> 5.92"
        }
      }
      required_version = ">= 1.2"
    }

    provider "aws" {
      region = "us-east-1"
    }

    data "aws_ami" "ubuntu" {
      most_recent = true
      filter {
        name   = "name"
        values = ["ubuntu/images/hvm-ssd-gp3/ubuntu-noble-24.04-amd64-server-*"]
      }
      owners = ["099720109477"]
    }

    resource "aws_instance" "app_server" {
      ami           = data.aws_ami.ubuntu.id
      instance_type = "t3.micro"
      tags = {
        Name = "learn-terraform"
      }
    }

  # 正确格式：backend 是字符串
  backend: |
    backend "local" {
    }

  terraformVersion: "1.8.0"

  # AWS 凭证（从 secret 读取）
  env:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: aws-creds
          key: access-key
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: aws-creds
          key: secret-key