apiVersion: tf.galleybytes.com/v1beta1
kind: Terraform
metadata:
  name: terraform-01-ec2
spec:
  # ✅ v0.17.1 唯一正确字段：module（不是 terraformModule！）
  terraformModule:
    configMapRef:
      name: terraform-01-ec2

  # 后端配置
  backend: |
    backend "local" {}

  terraformVersion: "1.8.0"

  # AWS 凭证
  env:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: aws-creds
          key: access-key
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: aws-creds
          key: secret-key