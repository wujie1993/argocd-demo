name: Checkov

on:
  pull_request:
    paths:
      - 'terraform-operator/**/*.tf'
      - '.github/workflows/checkov.yml'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  checkov:
    name: Run Checkov
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@<FULL_40_CHARACTER_COMMIT_SHA_FOR_THE_APPROVED_V12_RELEASE>
        with:
          directory: terraform-operator
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif
          quiet: true
          soft_fail: false

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif